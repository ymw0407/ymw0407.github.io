title: MinWoo's Blog
description: > # this means to ignore newlines until "baseurl:"
    Write an awesome description for your new site here. You can edit this
    line in _config.yml. It will appear in your document head meta (for
    Google search results) and in your feed.xml site description.
permalink: ":title/"
baseurl: "/blog" # the subpath of your site, e.g. /blog
url: "https://ymw0407.github.io" # the base hostname & protocol for your site, e.g. http://example.com
site-twitter: #if your site has a twitter account, enter it here

# Author Settings
author: Yun Min Woo # add your name
author-img: yunminwoo.jpeg # add your photo
about-author: Studing Computer Science at Kookmin Univ. # add description
social-twitter: # add your Twitter handle
social-facebook: # add your Facebook handle
social-github: ymw0407 # add your Github handle
social-linkedin: # add your Linkedin handle
social-email: yunminwo1211@kookmin.ac.kr # add your Email address

# Tracker
analytics: # Google Analytics

# Build Settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
plugins:
    - jekyll-sitemap
    - jekyll-paginate
    - jemoji

paginate: 8
paginate_path: "/page/:num"

exclude: ["node_modules", "gulpfile.js", "package.json", "yarn.lock"]
